<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 剧本分镜生成器 | Storyboard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overflow: hidden;
        }
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Canvas Grid Background */
        .canvas-bg {
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .glass-panel {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Drag Drop Zone */
        .drop-zone {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .drop-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
            transition: left 0.5s;
        }
        .drop-zone:hover::before {
            left: 100%;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.15);
            transform: scale(1.02);
        }
        .drop-zone.has-file {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        
        /* Scene List Styles */
        .scene-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .scene-item:hover {
            background: rgba(255,255,255,0.05);
            border-left-color: #3b82f6;
        }
        .scene-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: #3b82f6;
        }
        .scene-item.selected-for-gen {
            background: rgba(16, 185, 129, 0.15);
            border-left-color: #10b981;
        }
        .shot-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .shot-list.expanded {
            max-height: 600px;
            overflow-y: auto;
        }
        
        /* Shot Card */
        .shot-card {
            position: absolute;
            transition: box-shadow 0.2s, transform 0.1s;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .shot-card:active {
            cursor: grabbing;
        }
        .shot-card:hover {
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .shot-card.dragging {
            opacity: 0.9;
            z-index: 1000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transition: none;
        }
        .shot-card.selected {
            box-shadow: 0 0 0 2px #3b82f6, 0 10px 40px rgba(59, 130, 246, 0.3);
        }
        .shot-card.has-image {
            border-color: #10b981;
        }
        
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 50%);
            border-radius: 0 0 4px 0;
            z-index: 10;
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .grid-overlay.active {
            opacity: 1;
        }
        
        /* Loading Animation */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #333;
            border-bottom-color: #3b82f6;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }

        /* Section headers */
        .section-header {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15), transparent);
            border-left: 3px solid #3b82f6;
        }
        
        /* Grid selection buttons */
        .grid-btn {
            position: relative;
            overflow: hidden;
        }
        .grid-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .grid-btn.active::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            background: #3b82f6;
            border-radius: 50%;
        }

        /* Aspect ratio buttons */
        .aspect-btn {
            transition: all 0.2s;
        }
        .aspect-btn.active {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #10b981;
        }

        /* Prompt textarea */
        .prompt-textarea {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
        }
        .prompt-textarea:focus {
            border-color: rgba(59, 130, 246, 0.5);
            outline: none;
        }

        /* Animations */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); }
        }
        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        /* Checkbox custom style */
        .custom-checkbox {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 3px;
            background: transparent;
            cursor: pointer;
            position: relative;
        }
        .custom-checkbox:checked {
            background: #10b981;
            border-color: #10b981;
        }
        .custom-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
        }

        /* Shot item in list - Selection styles */
        .shot-item {
            transition: all 0.2s;
            cursor: pointer;
            border-left: 2px solid transparent;
        }
        .shot-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .shot-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-left-color: #3b82f6;
        }
        .shot-item.has-image {
            border-left: 2px solid #10b981;
        }
        
        /* Scene selection checkbox */
        .scene-select-checkbox {
            appearance: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .scene-select-checkbox:checked {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .scene-select-checkbox:checked::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <!-- Header -->
    <header class="glass h-14 flex items-center justify-between px-6 z-50 relative border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center font-bold text-white text-lg">S</div>
            <h1 class="text-lg font-bold tracking-wide bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                Storyboard AI <span class="text-xs font-normal text-gray-500 ml-2">剧本分镜生成器</span>
            </h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-xs text-gray-400">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                文生图模式
            </div>
            <button onclick="exportProject()" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-sm rounded-md transition-colors flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                导出项目
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Left Panel -->
        <aside class="w-[480px] glass border-r border-white/5 flex flex-col z-40 overflow-y-auto">
            
            <!-- API Settings -->
            <div class="p-4 border-b border-white/5 space-y-3">
                <div class="flex items-center justify-between">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">API 配置</label>
                    <button onclick="toggleApiSettings()" class="text-xs text-blue-400 hover:text-blue-300">配置</button>
                </div>
                <div id="apiSettings" class="space-y-2">
                    <input type="password" id="apiKey" placeholder="输入 Toapis API Key" class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50">
                    <div class="flex gap-2">
                        <select id="modelSelect" class="flex-1 bg-black/30 border border-white/10 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500/50">
                            <option value="gpt-4o">GPT-4o (剧本拆解)</option>
                            <option value="gpt-4o-mini">GPT-4o Mini (快速)</option>
                        </select>
                        <select id="imageModel" class="flex-1 bg-black/30 border border-white/10 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500/50">
                            <option value="gpt-4o-image">GPT-4o Image</option>
                            <option value="gemini-2.5-flash-image">Gemini 2.5 Flash</option>
                            <option value="nano-banana-pro">Nano Banana Pro</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Style Settings (Prefix) -->
            <div class="p-4 border-b border-white/5 space-y-3">
                <div class="flex items-center justify-between">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>
                        前缀提示词 (风格设定)
                    </label>
                    <button onclick="regenerateStyle()" class="text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        AI分析
                    </button>
                </div>
                
                <div class="space-y-2">
                    <input type="text" id="atmosphere" placeholder="氛围基调: 电影感、悬疑紧张、温馨治愈..." class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50">
                    <input type="text" id="colorPalette" placeholder="色彩倾向: cinematic color grading, 青橙对比..." class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50">
                    <input type="text" id="lighting" placeholder="光影质感: dramatic lighting, 柔光散射..." class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50">
                </div>
            </div>

            <!-- Word Upload Section -->
            <div class="p-4 border-b border-white/5">
                <div class="section-header px-3 py-2 mb-3 rounded">
                    <label class="text-xs font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        剧本文件上传
                    </label>
                </div>
                
                <div id="dropZone" class="drop-zone rounded-lg p-4 text-center cursor-pointer mb-3">
                    <input type="file" id="fileInput" accept=".doc,.docx,.txt" class="hidden" onchange="handleFileSelect(event)">
                    
                    <div id="dropZoneContent" class="flex flex-col items-center gap-2">
                        <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center">
                            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <div>
                            <p class="text-sm text-gray-300 font-medium">拖拽 Word 文件到此处</p>
                            <p class="text-xs text-gray-500 mt-1">支持 .doc .docx .txt 格式</p>
                        </div>
                    </div>

                    <div id="uploadSuccess" class="hidden flex-col items-center gap-2">
                        <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center">
                            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p class="text-sm text-green-400 font-medium">文件已加载</p>
                        <p id="fileName" class="text-xs text-gray-400"></p>
                        <button onclick="clearFile()" class="text-xs text-gray-500 hover:text-gray-300 underline">清除</button>
                    </div>
                </div>

                <!-- 剧本内容编辑区域 -->
                <div class="mb-3">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs text-gray-400">剧本内容</label>
                        <button onclick="clearScript()" class="text-xs text-gray-500 hover:text-gray-300">清空</button>
                    </div>
                    <textarea id="scriptInput" placeholder="在此输入或粘贴剧本内容，或上传Word文件自动填充...&#10;支持格式: 第X场 / 场景X / SCENE X / EXT./INT." class="w-full h-20 bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-blue-500/50 resize-none"></textarea>
                </div>

                <button onclick="analyzeScript()" id="analyzeBtn" class="w-full py-2.5 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white text-sm font-medium rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-purple-500/20">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    AI 拆解剧本
                </button>
            </div>

            <!-- Scenes List - 中缀选择区域 -->
            <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
                <div class="p-3 border-b border-white/5 flex items-center justify-between bg-white/5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        中缀选择 (点击选择镜头)
                    </label>
                    <div class="flex items-center gap-2">
                        <span id="sceneCount" class="text-xs text-gray-600">0 场</span>
                        <button onclick="generateSelectedShots()" class="text-xs bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded transition-colors font-medium animate-pulse">
                            生成选中
                        </button>
                    </div>
                </div>
                
                <div id="scenesList" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <div class="text-center text-gray-600 text-xs py-8 flex flex-col items-center gap-2">
                        <svg class="w-8 h-8 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <span>请先上传剧本并点击"AI 拆解"</span>
                        <span class="text-[10px] opacity-50">拆解后在此选择镜头作为中缀</span>
                    </div>
                </div>
            </div>

            <!-- Suffix Prompt Settings -->
            <div class="p-4 border-t border-white/5 space-y-3 bg-black/20">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between">
                    <span class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>
                        后缀提示词 (布局设置)
                    </span>
                </label>
                
                <!-- Grid Selection -->
                <div class="space-y-2">
                    <label class="text-xs text-gray-500">分镜格数</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setGridSize('3x3')" class="grid-btn px-3 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded text-xs transition-all text-center" data-grid="3x3">
                            <div class="grid grid-cols-3 gap-0.5 w-6 h-6 mx-auto mb-1 opacity-60">
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                            </div>
                            3×3 (9格)
                        </button>
                        <button onclick="setGridSize('4x4')" class="grid-btn px-3 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded text-xs transition-all text-center" data-grid="4x4">
                            <div class="grid grid-cols-4 gap-0.5 w-6 h-6 mx-auto mb-1 opacity-60">
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                            </div>
                            4×4 (16格)
                        </button>
                        <button onclick="setGridSize('5x5')" class="grid-btn active px-3 py-2 bg-blue-600/20 hover:bg-blue-600/30 border border-blue-500/50 rounded text-xs transition-all text-center text-blue-400" data-grid="5x5">
                            <div class="grid grid-cols-5 gap-0.5 w-6 h-6 mx-auto mb-1 opacity-60">
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>
                                <div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div><div class="bg-current rounded-[1px]"></div>

            <p id="loadingText" class="text-gray-400 text-sm animate-pulse">正在生成...</p>

    <script>
        // Global State
        let scenes = [];
        let shots = [];
        let selectedShot = null;
        let selectedShots = new Set(); // 中缀选择：存储选中的镜头ID
        let currentGrid = '5x5';
        let currentAspectRatio = '16:9';
        let zoom = 100;
        let draggedElement = null;
        let dragOffset = { x: 0, y: 0 };
        let currentEditingShot = null;
        let uploadedFileName = null;
        let isDragging = false;
        let dragStartPos = { x: 0, y: 0 };

        // Default suffix prompts for each grid size
        const defaultSuffixPrompts = {
            '3x3': '3x3 Cinematic Storyboard Layout, 3x3 Grid, contains 9 independent frames, {aspectRatio} aspect ratio for each frame, professional movie production storyboard, high quality, detailed composition',
            '4x4': '4x4 Cinematic Storyboard Layout, 4x4 Grid, contains 16 independent frames, {aspectRatio} aspect ratio for each frame, professional movie production storyboard, high quality, detailed composition',
            '5x5': '5x5 Cinematic Storyboard Layout, 5x5 Grid, contains 25 independent frames, {aspectRatio} aspect ratio for each frame, professional sci-fi movie production storyboard, rigorous visual structure, high quality'
        };

        // Aspect ratio descriptions
        const aspectRatioDesc = {
            '16:9': '16:9 widescreen cinematic',
            '4:3': '4:3 standard academy',
            '2.39:1': '2.39:1 anamorphic cinematic',
            '1:1': '1:1 square format'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage();
            setupCanvasInteractions();
            setupDragDrop();
            updateSuffixPrompt();
        });

        // Drag & Drop Setup
        function setupDragDrop() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('click', () => fileInput.click());

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropZone.classList.add('drag-over');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropZone.classList.remove('drag-over');
                }, false);
            });

            dropZone.addEventListener('drop', handleDrop, false);
        }

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if (files.length === 0) return;
            
            const file = files[0];
            const validTypes = [
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'application/msword',
                'text/plain'
            ];

            if (!validTypes.includes(file.type) && !file.name.endsWith('.docx') && !file.name.endsWith('.doc') && !file.name.endsWith('.txt')) {
                alert('请上传 Word 文档 (.doc, .docx) 或文本文件 (.txt)');
                return;
            }

            uploadedFileName = file.name;
            showUploadSuccess(file.name);

            if (file.name.endsWith('.txt')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('scriptInput').value = e.target.result;
                };
                reader.readAsText(file);
            } else {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const arrayBuffer = e.target.result;
                    mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                        .then(result => {
                            document.getElementById('scriptInput').value = result.value;
                        })
                        .catch(err => {
                            alert('读取 Word 文件失败，请尝试转换为 .txt 格式');
                            console.error(err);
                        });
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function showUploadSuccess(filename) {
            const dropZone = document.getElementById('dropZone');
            const content = document.getElementById('dropZoneContent');
            const success = document.getElementById('uploadSuccess');
            const fileNameSpan = document.getElementById('fileName');
            
            dropZone.classList.add('has-file');
            content.classList.add('hidden');
            success.classList.remove('hidden');
            success.classList.add('flex');
            fileNameSpan.textContent = filename;
        }

        function clearFile() {
            const dropZone = document.getElementById('dropZone');
            const content = document.getElementById('dropZoneContent');
            const success = document.getElementById('uploadSuccess');
            const fileInput = document.getElementById('fileInput');
            
            dropZone.classList.remove('has-file');
            content.classList.remove('hidden');
            success.classList.add('hidden');
            success.classList.remove('flex');
            fileInput.value = '';
            uploadedFileName = null;
        }

        function clearScript() {
            document.getElementById('scriptInput').value = '';
        }

        // AI分析剧本并自动填充风格
        async function analyzeScript() {
            const script = document.getElementById('scriptInput').value.trim();
            const apiKey = document.getElementById('apiKey').value;
            
            if (!script) {
                alert('请输入剧本内容');
                return;
            }

            showLoading('正在分析剧本结构及风格...', 'AI正在识别场景和镜头...');

            try {
                await simulateAIAnalysis(script);
                autoFillStyle(script);
                selectedShots.clear(); // 清空之前的选择
                renderScenesList();    // 只渲染左侧列表，不自动生成画布
                hideLoading();
                saveToLocalStorage();
            } catch (error) {
                hideLoading();
                alert('分析失败: ' + error.message);
                console.error(error);
            }
        }

        // 自动填充风格提示词
        function autoFillStyle(script) {
            const lowerScript = script.toLowerCase();
            
            let atmosphere = '电影感 cinematic';
            let color = 'cinematic color grading';
            let lighting = 'dramatic lighting';
            
            if (lowerScript.includes('雨') || lowerScript.includes('夜') || lowerScript.includes('暗') || lowerScript.includes('悬疑')) {
                atmosphere = '悬疑紧张 noir风格';
                color = '高对比度黑白，冷色调 blue-teal tones';
                lighting = '低调照明 low-key lighting，硬光剪影，霓虹反光';
            } else if (lowerScript.includes('科幻') || lowerScript.includes('未来') || lowerScript.includes('赛博')) {
                atmosphere = '赛博朋克 cyberpunk，未来主义';
                color = '青橙对比 teal-orange contrast，霓虹色调 neon colors';
                lighting = '体积光 volumetric lighting，LED光源，全息投影';
            } else if (lowerScript.includes('温馨') || lowerScript.includes('家庭') || lowerScript.includes('爱情')) {
                atmosphere = '温馨治愈 warm，柔和浪漫 romantic';
                color = '暖色调 warm tones，金色时光 golden hour';
                lighting = '柔光散射 soft lighting，自然光 natural light';
            } else if (lowerScript.includes('战') || lowerScript.includes('动作') || lowerScript.includes('追逐')) {
                atmosphere = '紧张刺激 intense，高能动作 action-packed';
                color = 'desaturated muted colors，冷灰调 cool grays';
                lighting = '手持摄影感 handheld feel，快速剪辑光效';
            }
            
            document.getElementById('atmosphere').value = atmosphere;
            document.getElementById('colorPalette').value = color;
            document.getElementById('lighting').value = lighting;
        }

        function regenerateStyle() {
            const script = document.getElementById('scriptInput').value;
            if (script.trim()) {
                autoFillStyle(script);
            }
        }

        async function simulateAIAnalysis(script) {
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            const lines = script.split('\n').filter(l => l.trim());
            scenes = [];
            let currentScene = null;
            let shotCounter = 1;
            
            // Scene detection patterns
            const scenePatterns = [
                /^第[一二三四五六七八九十\d]+场[：:]/,
                /^场景?\s*\d+[：:]/,
                /^SCENE\s*\d+[：:]/i,
                /^(EXT|INT)[\.\s]/i,
                /^场\s*\d+/,
                /^景\s*\d+/
            ];
            
            lines.forEach((line) => {
                const trimmedLine = line.trim();
                const isSceneHeader = scenePatterns.some(pattern => pattern.test(trimmedLine)) ||
                                     (trimmedLine.includes('场') && trimmedLine.length < 25 && !trimmedLine.includes('。'));
                
                if (isSceneHeader) {
                    if (currentScene && currentScene.shots.length > 0) {
                        scenes.push(currentScene);
                    }
                    currentScene = {
                        id: `SC${scenes.length + 1}`,
                        title: trimmedLine,
                        shots: []
                    };
                } else if (currentScene && trimmedLine.length > 5) {
                    // Split into sentences for shots
                    const sentences = trimmedLine.match(/[^。！？.!?]+[。！？.!?]+/g) || [trimmedLine];
                    sentences.forEach(sentence => {
                        if (sentence.trim().length > 5) {
                            currentScene.shots.push({
                                id: `${currentScene.id}_SHOT${shotCounter++}`,
                                description: sentence.trim(),
                                type: '中景',
                                cameraMove: '固定',
                                generated: false,
                                image: null,
                                x: 0, y: 0, width: 300, height: 200 // 初始位置，生成时再分配
                            });
                        }
                    });
                }
            });
            
            if (currentScene && currentScene.shots.length > 0) {
                scenes.push(currentScene);
            }
            
            // Default scene if none detected
            if (scenes.length === 0 && script.length > 0) {
                const defaultScene = {
                    id: 'SC1',
                    title: '未命名场景',
                    shots: []
                };
                const sentences = script.match(/[^。！？.!?]+[。！？.!?]+/g) || [script];
                sentences.forEach(sentence => {
                    if (sentence.trim().length > 5) {
                        defaultScene.shots.push({
                            id: `SC1_SHOT${shotCounter++}`,
                            description: sentence.trim(),
                            type: '中景',
                            cameraMove: '固定',
                            generated: false,
                            image: null,
                            x: 0, y: 0, width: 300, height: 200
                        });
                    }
                });
                if (defaultScene.shots.length > 0) {
                    scenes.push(defaultScene);
                }
            }
            
            // Create flat shots array
            shots = [];
            scenes.forEach((scene) => {
                scene.shots.forEach((shot) => {
                    shots.push({
                        ...shot,
                        sceneId: scene.id,
                        sceneTitle: scene.title
                    });
                });
            });
        }

        // Render scenes list with shot selection (中缀选择)
        function renderScenesList() {
            const container = document.getElementById('scenesList');
            document.getElementById('sceneCount').textContent = `${scenes.length} 场`;
            
            if (scenes.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-600 text-xs py-8 flex flex-col items-center gap-2">
                        <svg class="w-8 h-8 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <span>请先上传剧本并点击"AI 拆解"</span>
                        <span class="text-[10px] opacity-50">拆解后在此选择镜头作为中缀</span>
                    </div>`;
                return;
            }
            
            container.innerHTML = scenes.map((scene) => {
                const sceneSelected = scene.shots.every(s => selectedShots.has(s.id));
                const scenePartial = scene.shots.some(s => selectedShots.has(s.id)) && !sceneSelected;
                
                return `
                <div class="scene-item rounded-lg mb-2 bg-white/5" data-scene-id="${scene.id}">
                    <div class="p-3 flex items-center gap-2 cursor-pointer hover:bg-white/5" onclick="toggleScene('${scene.id}')">
                        <input type="checkbox" class="scene-select-checkbox" 
                               ${sceneSelected ? 'checked' : ''} 
                               ${scenePartial ? 'data-partial="true"' : ''}
                               onclick="event.stopPropagation(); toggleSceneSelection('${scene.id}')" 
                               title="选择整场">
                        <span class="text-xs font-bold text-blue-400 mono bg-blue-500/10 px-2 py-0.5 rounded">${scene.id}</span>
                        <span class="text-sm text-gray-300 truncate flex-1 font-medium">${scene.title}</span>
                        <span class="text-[10px] text-gray-500 bg-black/30 px-2 py-1 rounded-full">${scene.shots.length} 镜头</span>
                        <svg class="w-4 h-4 text-gray-500 transition-transform" id="arrow-${scene.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                    <div class="shot-list expanded px-3 pb-2" id="shots-${scene.id}">
                        ${scene.shots.map(shot => {
                            const isSelected = selectedShots.has(shot.id);
                            const hasImage = shot.image;
                            return `
                            <div class="shot-item text-xs text-gray-400 py-2 px-3 bg-black/20 rounded mb-1 flex items-center gap-2 ${isSelected ? 'selected' : ''} ${hasImage ? 'has-image' : ''}" 
                                 onclick="toggleShotSelection('${shot.id}')" 
                                 title="点击选择作为中缀">
                                <span class="mono text-gray-500 text-[10px] w-12">${shot.id.split('_')[1]}</span>
                                <span class="truncate flex-1 ${isSelected ? 'text-blue-300' : ''}">${shot.description}</span>
                                ${hasImage ? '<span class="text-[10px] text-green-400">✓</span>' : ''}
                                ${isSelected ? '<span class="text-[10px] text-blue-400 ml-1">●</span>' : ''}
                            </div>
                        `}).join('')}
                    </div>
                </div>
            `}).join('');
        }

        // 切换场景选择（全选/取消全选该场次所有镜头作为中缀）
        function toggleSceneSelection(sceneId) {
            const scene = scenes.find(s => s.id === sceneId);
            if (!scene) return;
            
            const allSelected = scene.shots.every(s => selectedShots.has(s.id));
            
            if (allSelected) {
                // 取消全选
                scene.shots.forEach(shot => selectedShots.delete(shot.id));
            } else {
                // 全选
                scene.shots.forEach(shot => selectedShots.add(shot.id));
            }
            
            renderScenesList();
            updateCanvasStats();
        }

        // 切换单个镜头选择（中缀选择）
        function toggleShotSelection(shotId) {
            if (selectedShots.has(shotId)) {
                selectedShots.delete(shotId);
            } else {
                selectedShots.add(shotId);
            }
            renderScenesList();
            updateCanvasStats();
        }

        function toggleScene(sceneId) {
            const shotList = document.getElementById(`shots-${sceneId}`);
            const arrow = document.getElementById(`arrow-${sceneId}`);
            
            if (shotList.classList.contains('expanded')) {
                shotList.classList.remove('expanded');
                arrow.style.transform = 'rotate(0deg)';
            } else {
                shotList.classList.add('expanded');
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        // 生成选中的中缀镜头（在画布上生成）
        async function generateSelectedShots() {
            if (selectedShots.size === 0) {
                alert('请先选择要生成的镜头（中缀）');
                return;
            }
            
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert('请先配置 API Key');
                return;
            }

            const selectedShotsArray = Array.from(selectedShots).map(id => shots.find(s => s.id === id)).filter(Boolean);
            
            showLoading(`准备生成 ${selectedShotsArray.length} 个镜头...`, '组合前缀+中缀+后缀...');
            
            // 为选中的镜头分配画布位置（网格布局）
            selectedShotsArray.forEach((shot, index) => {
                if (!shot.x || shot.x === 0) {
                    shot.x = 100 + (index % 5) * 320;
                    shot.y = 100 + Math.floor(index / 5) * 240;
                }
                // 如果画布上还没有这个卡片，创建它
                if (!document.querySelector(`[data-id="${shot.id}"]`)) {
                    createShotElement(shot, index);
                }
            });
            
            // 逐个生成
            for (let i = 0; i < selectedShotsArray.length; i++) {
                const shot = selectedShotsArray[i];
                showLoading(`正在生成 (${i+1}/${selectedShotsArray.length})...`, shot.description.substring(0, 40) + '...');
                await generateShotImage(shot.id);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            hideLoading();
            renderScenesList(); // 更新左侧列表显示已生成状态
            saveToLocalStorage();
        }

        // Canvas Functions
        function createShotElement(shot, index) {
            const container = document.getElementById('shotsContainer');
            const el = document.createElement('div');
            
            el.className = `shot-card absolute bg-gray-900 rounded-lg border overflow-hidden shadow-xl ${shot.image ? 'has-image border-green-500/30' : 'border-white/10'}`;
            el.style.left = shot.x + 'px';
            el.style.top = shot.y + 'px';
            el.style.width = shot.width + 'px';
            el.style.height = shot.height + 'px';
            el.dataset.id = shot.id;
            
            // 构建完整提示词预览
            const fullPrompt = `${getPrefixPrompt()} ${shot.description} ${document.getElementById('suffixPrompt').value}`;
            
            el.innerHTML = `
                <div class="h-full flex flex-col pointer-events-none">
                    <div class="h-6 bg-white/5 border-b border-white/5 flex items-center justify-between px-2">
                        <span class="text-[10px] text-gray-500 mono">${shot.id}</span>
                        <div class="flex gap-1 pointer-events-auto">
                            <button onclick="event.stopPropagation(); editShot('${shot.id}')" class="text-gray-600 hover:text-blue-400 transition-colors p-1" title="编辑">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button onclick="event.stopPropagation(); deleteShot('${shot.id}')" class="text-gray-600 hover:text-red-400 transition-colors p-1" title="删除">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex-1 relative bg-black/40 group cursor-pointer pointer-events-auto" onclick="event.stopPropagation(); selectShot('${shot.id}')">
                        ${shot.image ? `
                            <img src="${shot.image}" class="w-full h-full object-cover pointer-events-none" alt="">
                        ` : `
                            <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 p-4 text-center pointer-events-none">
                                <svg class="w-8 h-8 mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <span class="text-[10px] line-clamp-3 opacity-70">${shot.description}</span>
                                <span class="text-[9px] text-blue-400 mt-2">等待生成...</span>
                            </div>
                        `}
                        <div class="resize-handle pointer-events-auto" onmousedown="event.stopPropagation(); startResize(event, '${shot.id}')"></div>
                    </div>
                    <div class="h-7 bg-white/5 border-t border-white/5 px-2 flex items-center justify-between pointer-events-none">
                        <span class="text-[10px] text-gray-400 truncate flex-1">${shot.type} | ${shot.cameraMove}</span>
                        <span class="text-[10px] text-gray-600 mono">${shot.sceneId}</span>
                    </div>
                </div>
            `;
            
            el.addEventListener('mousedown', (e) => {
                if (e.target.closest('button') || e.target.classList.contains('resize-handle')) return;
                startDrag(e, shot.id);
            });
            
            container.appendChild(el);
        }

        function startDrag(e, shotId) {
            e.preventDefault();
            e.stopPropagation();
            
            isDragging = false;
            dragStartPos = { x: e.clientX, y: e.clientY };
            
            draggedElement = document.querySelector(`[data-id="${shotId}"]`);
            const shot = shots.find(s => s.id === shotId);
            
            const rect = draggedElement.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            
            draggedElement.classList.add('dragging');
            selectShot(shotId);
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function onDrag(e) {
            if (!draggedElement) return;
            
            if (!isDragging) {
                const dx = Math.abs(e.clientX - dragStartPos.x);
                const dy = Math.abs(e.clientY - dragStartPos.y);
                if (dx > 5 || dy > 5) {
                    isDragging = true;
                }
            }
            
            const canvas = document.getElementById('canvas');
            const canvasRect = canvas.getBoundingClientRect();
            const zoomFactor = zoom / 100;
            
            let x = (e.clientX - canvasRect.left - dragOffset.x) / zoomFactor;
            let y = (e.clientY - canvasRect.top - dragOffset.y) / zoomFactor;
            
            x = Math.max(0, Math.min(x, 3000 - draggedElement.offsetWidth));
            y = Math.max(0, Math.min(y, 2000 - draggedElement.offsetHeight));
            
            const shotId = draggedElement.dataset.id;
            const shot = shots.find(s => s.id === shotId);
            
            shot.x = x;
            shot.y = y;
            
            draggedElement.style.left = x + 'px';
            draggedElement.style.top = y + 'px';
        }

        function stopDrag(e) {
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
            }
            draggedElement = null;
            isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
            saveToLocalStorage();
        }

        function startResize(e, shotId) {
            e.preventDefault();
            e.stopPropagation();
            
            const el = document.querySelector(`[data-id="${shotId}"]`);
            const shot = shots.find(s => s.id === shotId);
            const startX = e.clientX;
            const startY = e.clientY;
            const startWidth = shot.width;
            const startHeight = shot.height;
            
            function onResize(ev) {
                const dx = (ev.clientX - startX) / (zoom / 100);
                const dy = (ev.clientY - startY) / (zoom / 100);
                
                shot.width = Math.max(150, startWidth + dx);
                shot.height = Math.max(100, startHeight + dy);
                
                el.style.width = shot.width + 'px';
                el.style.height = shot.height + 'px';
            }
            
            function stopResize() {
                document.removeEventListener('mousemove', onResize);
                document.removeEventListener('mouseup', stopResize);
                saveToLocalStorage();
            }
            
            document.addEventListener('mousemove', onResize);
            document.addEventListener('mouseup', stopResize);
        }

        function selectShot(id) {
            document.querySelectorAll('.shot-card').forEach(el => el.classList.remove('selected'));
            const el = document.querySelector(`[data-id="${id}"]`);
            if (el) el.classList.add('selected');
            selectedShot = id;
        }

        function deselectAll(event) {
            if (event.target.id === 'canvas' || event.target.id === 'canvasContainer') {
                document.querySelectorAll('.shot-card').forEach(el => el.classList.remove('selected'));
                selectedShot = null;
            }
        }

        function deleteShot(id) {
            if (confirm('确定要删除这个镜头吗？')) {
                const el = document.querySelector(`[data-id="${id}"]`);
                if (el) el.remove();
                
                // 从shots数组中移除位置信息但保留数据，或完全移除
                const shot = shots.find(s => s.id === id);
                if (shot) {
                    shot.x = 0;
                    shot.y = 0;
                    shot.image = null;
                }
                
                selectedShots.delete(id);
                updateCanvasStats();
                renderScenesList();
                saveToLocalStorage();
            }
        }

        // Image Generation
        async function generateShotImage(shotId) {
            const apiKey = document.getElementById('apiKey').value;
            const shot = shots.find(s => s.id === shotId);
            
            // 组合完整提示词：前缀 + 中缀 + 后缀
            const prefix = getPrefixPrompt();
            const suffix = document.getElementById('suffixPrompt').value;
            const fullPrompt = `${prefix} ${shot.description} ${suffix}`;
            
            try {
                const response = await fetch('https://api.toapis.com/v1/images/generations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: document.getElementById('imageModel').value,
                        prompt: fullPrompt,
                        n: 1,
                        size: getImageSize(),
                        quality: "standard"
                    })
                });

                if (!response.ok) throw new Error('API 请求失败');
                
                const data = await response.json();
                shot.image = data.data[0].url;
                shot.generated = true;
                
                updateShotElement(shot);
                updateCanvasStats();
            } catch (error) {
                console.error('Image generation error:', error);
                // Fallback to placeholder
                shot.image = `https://picsum.photos/seed/${shotId}/400/300`;
                updateShotElement(shot);
                updateCanvasStats();
            }
        }

        function updateShotElement(shot) {
            const el = document.querySelector(`[data-id="${shot.id}"]`);
            if (el) {
                el.classList.add('has-image');
                el.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                const container = el.querySelector('.flex-1.relative');
                container.innerHTML = `
                    <img src="${shot.image}" class="w-full h-full object-cover pointer-events-none" alt="">
                    <div class="resize-handle pointer-events-auto" onmousedown="event.stopPropagation(); startResize(event, '${shot.id}')"></div>
                `;
            }
        }

        function getImageSize() {
            const sizes = {
                '16:9': '1024x576',
                '4:3': '1024x768',
                '2.39:1': '1280x536',
                '1:1': '1024x1024'
            };
            return sizes[currentAspectRatio] || '1024x1024';
        }

        // Prompt Construction
        function getPrefixPrompt() {
            const atmosphere = document.getElementById('atmosphere').value || '电影感 cinematic';
            const color = document.getElementById('colorPalette').value || 'cinematic color grading';
            const lighting = document.getElementById('lighting').value || 'dramatic lighting';
            return `${atmosphere}, ${color}, ${lighting},`;
        }

        // Grid and Aspect Ratio Settings
        function setGridSize(size) {
            currentGrid = size;
            document.querySelectorAll('.grid-btn').forEach(btn => {
                if (btn.dataset.grid === size) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            updateSuffixPrompt();
            saveToLocalStorage();
        }

        function setAspectRatio(ratio) {
            currentAspectRatio = ratio;
            document.querySelectorAll('.aspect-btn').forEach(btn => {
                if (btn.dataset.aspect === ratio) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            updateSuffixPrompt();
            saveToLocalStorage();
        }

        function updateSuffixPrompt() {
            const template = defaultSuffixPrompts[currentGrid];
            const aspectDesc = aspectRatioDesc[currentAspectRatio];
            const prompt = template.replace('{aspectRatio}', aspectDesc);
            document.getElementById('suffixPrompt').value = prompt;
        }

        function resetSuffixPrompt() {
            updateSuffixPrompt();
        }

        // UI Functions
        function toggleGrid() {
            const overlay = document.getElementById('gridOverlay');
            overlay.classList.toggle('active');
        }

        function updateZoom(value) {
            zoom = value;
            document.getElementById('zoomValue').textContent = value + '%';
            document.getElementById('canvas').style.transform = `scale(${value / 100})`;
        }

        function clearCanvas() {
            if (confirm('确定要清空画布吗？所有生成的图片将被清除，但剧本拆解数据会保留。')) {
                document.getElementById('shotsContainer').innerHTML = '';
                shots.forEach(shot => {
                    shot.x = 0;
                    shot.y = 0;
                    shot.image = null;
                    shot.generated = false;
                });
                selectedShots.clear();
                updateCanvasStats();
                renderScenesList();
                saveToLocalStorage();
            }
        }

        function editShot(id) {
            const shot = shots.find(s => s.id === id);
            currentEditingShot = shot;
            
            document.getElementById('modalShotId').textContent = `${id} (${shot.sceneId})`;
            document.getElementById('modalShotDesc').value = shot.description;
            document.getElementById('modalShotType').value = shot.type;
            document.getElementById('modalCameraMove').value = shot.cameraMove;
            
            updateModalPrompt();
            
            const img = document.getElementById('modalImage');
            const placeholder = document.getElementById('modalImagePlaceholder');
            
            if (shot.image) {
                img.src = shot.image;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
            
            const modal = document.getElementById('shotModal');
            const content = document.getElementById('shotModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeShotModal() {
            const modal = document.getElementById('shotModal');
            const content = document.getElementById('shotModalContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                currentEditingShot = null;
            }, 300);
        }

        function saveShotEdit() {
            if (!currentEditingShot) return;
            
            currentEditingShot.description = document.getElementById('modalShotDesc').value;
            currentEditingShot.type = document.getElementById('modalShotType').value;
            currentEditingShot.cameraMove = document.getElementById('modalCameraMove').value;
            
            // 如果已在画布上，更新显示
            const el = document.querySelector(`[data-id="${currentEditingShot.id}"]`);
            if (el) {
                // 更新底部信息
                const info = el.querySelector('.h-7 span:first-child');
                if (info) info.textContent = `${currentEditingShot.type} | ${currentEditingShot.cameraMove}`;
            }
            
            renderScenesList();
            closeShotModal();
            saveToLocalStorage();
        }

        function updateModalPrompt() {
            if (!currentEditingShot) return;
            const prefix = getPrefixPrompt();
            const suffix = document.getElementById('suffixPrompt').value;
            const fullPrompt = `${prefix} ${currentEditingShot.description} ${suffix}`;
            document.getElementById('modalFullPrompt').textContent = fullPrompt;
        }

        async function regenerateShotImage() {
            if (currentEditingShot) {
                await generateShotImage(currentEditingShot.id);
                const shot = shots.find(s => s.id === currentEditingShot.id);
                if (shot.image) {
                    document.getElementById('modalImage').src = shot.image;
                    document.getElementById('modalImage').classList.remove('hidden');
                    document.getElementById('modalImagePlaceholder').classList.add('hidden');
                }
            }
        }

        function updateCanvasStats() {
            const generated = shots.filter(s => s.image).length;
            const selected = selectedShots.size;
            document.getElementById('canvasStats').textContent = `选中 ${selected} 个 | 已生成 ${generated} 个`;
        }

        function showLoading(text, detail = '') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingDetail').textContent = detail;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('loadingOverlay').classList.add('flex');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('loadingOverlay').classList.remove('flex');
        }

        function toggleApiSettings() {
            const el = document.getElementById('apiSettings');
            el.classList.toggle('hidden');
        }

        // Local Storage
        function saveToLocalStorage() {
            const data = {
                scenes,
                shots,
                currentGrid,
                currentAspectRatio,
                selectedShots: Array.from(selectedShots),
                style: {
                    atmosphere: document.getElementById('atmosphere').value,
                    color: document.getElementById('colorPalette').value,
                    lighting: document.getElementById('lighting').value
                },
                suffixPrompt: document.getElementById('suffixPrompt').value
            };
            localStorage.setItem('storyboard_project_v3', JSON.stringify(data));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('storyboard_project_v3');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    scenes = data.scenes || [];
                    shots = data.shots || [];
                    currentGrid = data.currentGrid || '5x5';
                    currentAspectRatio = data.currentAspectRatio || '16:9';
                    if (data.selectedShots) {
                        selectedShots = new Set(data.selectedShots);
                    }
                    
                    if (data.style) {
                        document.getElementById('atmosphere').value = data.style.atmosphere || '';
                        document.getElementById('colorPalette').value = data.style.color || '';
                        document.getElementById('lighting').value = data.style.lighting || '';
                    }
                    
                    if (data.suffixPrompt) {
                        document.getElementById('suffixPrompt').value = data.suffixPrompt;
                    } else {
                        updateSuffixPrompt();
                    }
                    
                    setGridSize(currentGrid);
                    setAspectRatio(currentAspectRatio);
                    renderScenesList();
                    
                    // 恢复画布上的卡片（如果有图片的）
                    shots.forEach((shot, index) => {
                        if (shot.image && shot.x > 0) {
                            createShotElement(shot, index);
                        }
                    });
                    updateCanvasStats();
                } catch (e) {
                    console.error('Failed to load from localStorage:', e);
                    updateSuffixPrompt();
                }
            } else {
                updateSuffixPrompt();
            }
        }

        function exportProject() {
            const data = {
                scenes,
                shots,
                exportDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `storyboard_project_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function setupCanvasInteractions() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Delete' && selectedShot) {
                    deleteShot(selectedShot);
                }
                if (e.key === 'Escape') {
                    closeShotModal();
                }
            });
        }

        // Update prompt preview when style changes
        ['atmosphere', 'colorPalette', 'lighting', 'suffixPrompt'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', () => {
                    if (document.getElementById('shotModal').classList.contains('flex')) {
                        updateModalPrompt();
                    }
                });
            }
        });
    </script>
</body>
</html>
