<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 剧本分镜生成器 | Storyboard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overflow: hidden;
        }
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Canvas Grid Background */
        .canvas-bg {
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .glass-panel {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Drag Drop Zone - 紧凑 */
        .drop-zone {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .drop-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
            transition: left 0.5s;
        }
        .drop-zone:hover::before {
            left: 100%;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.15);
            transform: scale(1.02);
        }
        .drop-zone.has-file {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        
        /* Image Upload Zones */
        .image-ref-zone {
            border: 2px dashed rgba(168, 85, 247, 0.3);
            background: rgba(168, 85, 247, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .image-ref-zone.drag-over {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.15);
        }
        .image-ref-zone.has-image {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            border-style: solid;
        }
        
        /* Scene List Styles */
        .scene-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            margin-bottom: 2px;
        }
        .scene-item:hover {
            background: rgba(255,255,255,0.05);
            border-left-color: #3b82f6;
        }
        
        /* Shot List */
        .shot-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .shot-list.expanded {
            max-height: 500px;
            overflow-y: auto;
        }
        
        /* Shot Item */
        .shot-item {
            transition: all 0.2s;
            cursor: pointer;
            border-left: 3px solid transparent;
            position: relative;
            padding: 6px 10px;
            margin-bottom: 2px;
            border-radius: 4px;
            user-select: none;
            font-size: 11px;
        }
        .shot-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
        }
        .shot-item.selected {
            background: rgba(59, 130, 246, 0.25);
            border-left-color: #3b82f6;
        }
        .shot-item.has-image {
            border-left-color: #10b981;
        }
        
        /* Mid Prompt Textarea */
        .mid-prompt-area {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(168, 85, 247, 0.3);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            resize: vertical;
        }
        .mid-prompt-area:focus {
            border-color: rgba(168, 85, 247, 0.8);
            outline: none;
            background: rgba(0, 0, 0, 0.5);
        }
        
        /* Shot Card */
        .shot-card {
            position: absolute;
            transition: box-shadow 0.2s, transform 0.1s;
            cursor: grab;
            user-select: none;
            touch-action: none;
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .shot-card:active {
            cursor: grabbing;
        }
        .shot-card:hover {
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 10;
            border-color: rgba(168, 85, 247, 0.5);
        }
        .shot-card.dragging {
            opacity: 0.9;
            z-index: 1000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transition: none;
        }
        .shot-card.selected {
            box-shadow: 0 0 0 2px #a855f7, 0 10px 40px rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
        }
        .shot-card.has-image {
            border-color: #10b981;
        }
        
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 50%);
            border-radius: 0 0 4px 0;
            z-index: 10;
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .grid-overlay.active {
            opacity: 1;
        }
        
        /* Loading Animation */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #333;
            border-bottom-color: #a855f7;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #a855f7;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }

        /* Section headers */
        .section-header {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.15), transparent);
            border-left: 3px solid #a855f7;
        }
        
        /* Grid selection buttons */
        .grid-btn {
            position: relative;
            overflow: hidden;
        }
        .grid-btn.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: #a855f7;
        }
        .grid-btn.active::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
        }

        /* Aspect ratio buttons */
        .aspect-btn {
            transition: all 0.2s;
        }
        .aspect-btn.active {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #10b981;
        }

        /* Suffix textarea */
        .prompt-textarea {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
        }
        .prompt-textarea:focus {
            border-color: rgba(168, 85, 247, 0.5);
            outline: none;
        }

        /* Animations */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
            50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.8); }
        }
        .animate-glow {
            animation: glow 2s ease-in-out infinite;
        }

        /* Reference Image Preview */
        .ref-preview {
            width: 100%;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 4px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <!-- Header -->
    <header class="glass h-12 flex items-center justify-between px-4 z-50 relative border-b border-white/5 flex-shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-gradient-to-br from-purple-500 to-blue-600 rounded-lg flex items-center justify-center font-bold text-white text-sm">S</div>
            <h1 class="text-base font-bold tracking-wide bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                Storyboard AI <span class="text-[10px] font-normal text-gray-500 ml-1">剧本分镜生成器</span>
            </h1>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 text-xs text-gray-400">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                文生图+参考图模式
            </div>
            <button onclick="exportProject()" class="px-3 py-1.5 bg-purple-600 hover:bg-purple-500 text-white text-xs rounded-md transition-colors flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                导出
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Left Panel -->
        <aside class="w-[440px] glass border-r border-white/5 flex flex-col z-40 overflow-y-auto">
            
            <!-- API Settings -->
            <div class="p-3 border-b border-white/5 space-y-2 flex-shrink-0">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">API 配置</label>
                    <button onclick="toggleApiSettings()" class="text-[10px] text-purple-400 hover:text-purple-300">配置</button>
                </div>
                <div id="apiSettings" class="space-y-2">
                    <input type="password" id="apiKey" placeholder="输入 Toapis API Key" class="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/50">
                    <div class="flex gap-2">
                        <select id="modelSelect" class="flex-1 bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-purple-500/50">
                            <option value="gpt-4o">GPT-4o (剧本拆解)</option>
                            <option value="gpt-4o-mini">GPT-4o Mini (快速)</option>
                        </select>
                        <select id="imageModel" class="flex-1 bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-purple-500/50">
                            <option value="gpt-4o-image">GPT-4o Image</option>
                            <option value="gemini-2.5-flash-image">Gemini 2.5 Flash</option>
                            <option value="nano-banana-pro">Nano Banana Pro</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Prefix Settings -->
            <div class="p-3 border-b border-white/5 space-y-2 flex-shrink-0">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>
                        前缀提示词 (风格设定)
                    </label>
                    <button onclick="regenerateStyle()" class="text-[10px] text-purple-400 hover:text-purple-300 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        AI分析
                    </button>
                </div>
                
                <div class="space-y-1.5">
                    <input type="text" id="atmosphere" placeholder="氛围基调: 电影感、悬疑紧张..." class="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/50">
                    <input type="text" id="colorPalette" placeholder="色彩倾向: cinematic color grading..." class="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/50">
                    <input type="text" id="lighting" placeholder="光影质感: dramatic lighting..." class="w-full bg-black/30 border border-white/10 rounded px-2 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/50">
                </div>
            </div>

            <!-- Script Upload -->
            <div class="p-3 border-b border-white/5 flex-shrink-0">
                <div class="section-header px-2 py-1.5 mb-2 rounded">
                    <label class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider flex items-center gap-2">
                        <svg class="w-3 h-3 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        剧本文件上传
                    </label>
                </div>
                
                <div id="dropZone" class="drop-zone rounded-lg p-2 text-center cursor-pointer mb-2">
                    <input type="file" id="fileInput" accept=".doc,.docx,.txt" class="hidden" onchange="handleFileSelect(event)">
                    
                    <div id="dropZoneContent" class="flex items-center justify-center gap-2">
                        <div class="w-6 h-6 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0">
                            <svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <div class="text-left">
                            <p class="text-xs text-gray-300 font-medium">拖拽 Word 文件到此处</p>
                            <p class="text-[10px] text-gray-500">支持 .doc .docx .txt</p>
                        </div>
                    </div>

                    <div id="uploadSuccess" class="hidden flex items-center justify-center gap-2">
                        <div class="w-5 h-5 rounded-full bg-green-500/20 flex items-center justify-center flex-shrink-0">
                            <svg class="w-3 h-3 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <div class="text-left">
                            <p class="text-xs text-green-400 font-medium">文件已加载</p>
                            <p id="fileName" class="text-[10px] text-gray-400 leading-tight"></p>
                        </div>
                        <button onclick="event.stopPropagation(); clearFile()" class="text-[10px] text-gray-500 hover:text-gray-300 underline ml-2">清除</button>
                    </div>
                </div>

                <!-- Script Content -->
                <div class="mb-2">
                    <div class="flex items-center justify-between mb-1">
                        <label class="text-[10px] text-gray-400">剧本内容</label>
                        <button onclick="clearScript()" class="text-[10px] text-gray-500 hover:text-gray-300">清空</button>
                    </div>
                    <textarea id="scriptInput" placeholder="在此输入或粘贴剧本内容，或上传Word文件自动填充...&#10;支持格式: 第X场 / 场景X / SCENE X / EXT./INT." class="w-full h-32 bg-black/30 border border-white/10 rounded-lg px-3 py-2 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-purple-500/50 resize-none leading-relaxed"></textarea>
                </div>

                <button onclick="analyzeScript()" id="analyzeBtn" class="w-full py-2 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white text-xs font-medium rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-purple-500/20 mb-3">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    AI 拆解剧本
                </button>
            </div>

            <!-- Mid Prompt - 中缀对话框 -->
            <div class="p-3 border-b border-white/5 space-y-2 flex-shrink-0 bg-purple-900/10">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-semibold text-purple-300 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>
                        中缀提示词 (核心描述)
                    </label>
                    <div class="flex gap-2">
                        <button onclick="clearMidPrompt()" class="text-[10px] text-gray-500 hover:text-gray-300">清空</button>
                        <span class="text-[10px] text-gray-600">可编辑</span>
                    </div>
                </div>
                <textarea id="midPrompt" placeholder="在此输入或粘贴剧本内容作为中缀提示词...&#10;点击左侧拆解后的镜头可自动追加到此处&#10;生成时会结合：前缀 + 此处内容 + 后缀" class="mid-prompt-area w-full h-28 rounded-lg px-3 py-2 text-white placeholder-gray-600 focus:outline-none"></textarea>
                <p class="text-[10px] text-gray-500">提示：可从上方剧本复制粘贴，或点击场次中的镜头自动填入</p>
            </div>

            <!-- Reference Images - 人物参考图和场景参考图 -->
            <div class="p-3 border-b border-white/5 space-y-3 flex-shrink-0">
                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-pink-400"></span>
                    参考图片 (可选)
                </label>
                
                <!-- Character Reference -->
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500">人物参考图</label>
                    <div id="charRefZone" class="image-ref-zone rounded-lg p-2 text-center cursor-pointer" onclick="document.getElementById('charRefInput').click()">
                        <input type="file" id="charRefInput" accept="image/*" class="hidden" onchange="handleRefImage(event, 'char')">
                        <div id="charRefContent" class="flex flex-col items-center gap-1">
                            <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            <span class="text-[10px] text-gray-400">点击上传人物参考</span>
                        </div>
                        <img id="charRefPreview" class="ref-preview hidden" alt="人物参考">
                    </div>
                </div>

                <!-- Scene Reference -->
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500">场景参考图</label>
                    <div id="sceneRefZone" class="image-ref-zone rounded-lg p-2 text-center cursor-pointer" onclick="document.getElementById('sceneRefInput').click()">
                        <input type="file" id="sceneRefInput" accept="image/*" class="hidden" onchange="handleRefImage(event, 'scene')">
                        <div id="sceneRefContent" class="flex flex-col items-center gap-1">
                            <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 22V12h6v10"></path></svg>
                            <span class="text-[10px] text-gray-400">点击上传场景参考</span>
                        </div>
                        <img id="sceneRefPreview" class="ref-preview hidden" alt="场景参考">
                    </div>
                </div>
            </div>

            <!-- Scenes List - 用于选择镜头追加到中缀 -->
            <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
                <div class="p-2 border-b border-white/5 flex items-center justify-between bg-white/5 flex-shrink-0">
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        剧本拆解 (点击追加到中缀)
                    </label>
                    <div class="flex items-center gap-2">
                        <span id="sceneCount" class="text-[10px] text-gray-600">0 场</span>
                    </div>
                </div>
                
                <div id="scenesList" class="flex-1 overflow-y-auto p-1 space-y-1">
                    <div class="text-center text-gray-600 text-xs py-8 flex flex-col items-center gap-2">
                        <svg class="w-8 h-8 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>

                            16:9

                        <button onclick="setAspectRatio('4:3')" class="aspect-btn flex-1 px-2 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded text-[10px] transition-all text-center" data-aspect="4:3">
                            4:3
                        </button>
                        <button onclick="setAspectRatio('2.39:1')" class="aspect-btn flex-1 px-2 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded text-[10px] transition-all text-center" data-aspect="2.39:1">
                            2.39:1

                        <button onclick="setAspectRatio('1:1')" class="aspect-btn flex-1 px-2 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded text-[10px] transition-all text-center" data-aspect="1:1">

                <!-- Editable Suffix Prompt -->
                <div class="space-y-1">

        <!-- Right Panel: Canvas -->
        <main class="flex-1 relative bg-[#0a0a0a] overflow-hidden">
            <!-- Toolbar -->
            <div class="absolute top-4 left-4 right-4 z-30 flex items-center justify-between pointer-events-none">

                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>

                    </button>

                        网格
                    </button>

                        <input type="range" id="zoomSlider" min="50" max="150" value="100" class="w-16" oninput="updateZoom(this.value)">

                <div class="glass-panel px-3 py-2 rounded-full pointer-events-auto">

                    <div id="shotsContainer" class="relative w-full h-full"></div>

            <!-- Generate Button -->
            <button onclick="generateWithAllPrompts()" id="generateAllBtn" class="absolute bottom-6 right-6 px-6 h-12 bg-gradient-to-r from-purple-600 to-pink-600 rounded-full shadow-2xl flex items-center justify-center hover:scale-105 transition-transform z-40 animate-glow group" title="使用前缀+中缀+后缀生成">
                <svg class="w-5 h-5 text-white mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span class="text-white text-sm font-medium">生成图片</span>
            </button>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 z-[70] hidden items-center justify-center bg-black/90 backdrop-blur-md">
        <div class="text-center max-w-md px-4">
            <div class="loader mx-auto mb-4"></div>
            <p id="loadingText" class="text-gray-400 text-sm animate-pulse">正在生成...</p>
            <p id="loadingDetail" class="text-gray-600 text-xs mt-2 break-all"></p>
            <div id="loadingPrompt" class="mt-4 p-3 bg-white/5 rounded text-[10px] text-gray-500 mono break-all max-h-32 overflow-y-auto text-left"></div>
        </div>
    </div>

    <script>
        // Global State
        let scenes = [];
        let shots = [];
        let selectedShot = null;
        let currentGrid = '5x5';
        let currentAspectRatio = '16:9';
        let zoom = 100;
        let draggedElement = null;
        let dragOffset = { x: 0, y: 0 };
        let uploadedFileName = null;
        let isDragging = false;
        let dragStartPos = { x: 0, y: 0 };
        let referenceImages = {
            character: null,
            scene: null
        };

        // Default suffix prompts
        const defaultSuffixPrompts = {
            '3x3': '3x3 Cinematic Storyboard Layout, 3x3 Grid, contains 9 independent frames, {aspectRatio} aspect ratio for each frame, professional movie production storyboard, high quality, detailed composition',
            '4x4': '4x4 Cinematic Storyboard Layout, 4x4 Grid, contains 16 independent frames, {aspectRatio} aspect ratio for each frame, professional movie production storyboard, high quality, detailed composition',
            '5x5': '5x5 Cinematic Storyboard Layout, 5x5 Grid, contains 25 independent frames, {aspectRatio} aspect ratio for each frame, professional sci-fi movie production storyboard, rigorous visual structure, high quality'
        };

        const aspectRatioDesc = {
            '16:9': '16:9 widescreen cinematic',
            '4:3': '4:3 standard academy',
            '2.39:1': '2.39:1 anamorphic cinematic',
            '1:1': '1:1 square format'
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage();
            setupCanvasInteractions();
            setupDragDrop();
            setupRefImageDrop();
            updateSuffixPrompt();
        });

        // Setup Drag Drop for Script
        function setupDragDrop() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('click', () => fileInput.click());

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
            });

            dropZone.addEventListener('drop', handleDrop, false);
        }

        function setupRefImageDrop() {
            // Character ref drop
            const charZone = document.getElementById('charRefZone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
                charZone.addEventListener(e, preventDefaults, false);
            });
            ['dragenter', 'dragover'].forEach(e => {
                charZone.addEventListener(e, () => charZone.classList.add('drag-over'), false);
            });
            ['dragleave', 'drop'].forEach(e => {
                charZone.addEventListener(e, () => charZone.classList.remove('drag-over'), false);
            });
            charZone.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length) handleRefImage({ target: { files: [files[0]] } }, 'char');
            });

            // Scene ref drop
            const sceneZone = document.getElementById('sceneRefZone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
                sceneZone.addEventListener(e, preventDefaults, false);
            });
            ['dragenter', 'dragover'].forEach(e => {
                sceneZone.addEventListener(e, () => sceneZone.classList.add('drag-over'), false);
            });
            ['dragleave', 'drop'].forEach(e => {
                sceneZone.addEventListener(e, () => sceneZone.classList.remove('drag-over'), false);
            });
            sceneZone.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length) handleRefImage({ target: { files: [files[0]] } }, 'scene');
            });
        }

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFileSelect(e) {
            handleFiles(e.target.files);
        }

        function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            const validTypes = [
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'application/msword',
                'text/plain'
            ];

            if (!validTypes.includes(file.type) && !file.name.match(/\.(docx|doc|txt)$/)) {
                alert('请上传 Word 文档 (.doc, .docx) 或文本文件 (.txt)');
                return;
            }

            uploadedFileName = file.name;
            showUploadSuccess(file.name);

            if (file.name.endsWith('.txt')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('scriptInput').value = e.target.result;
                };
                reader.readAsText(file);
            } else {
                const reader = new FileReader();
                reader.onload = (e) => {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => {
                            document.getElementById('scriptInput').value = result.value;
                        })
                        .catch(err => {
                            alert('读取 Word 文件失败');
                            console.error(err);
                        });
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function showUploadSuccess(filename) {
            document.getElementById('dropZone').classList.add('has-file');
            document.getElementById('dropZoneContent').classList.add('hidden');
            document.getElementById('uploadSuccess').classList.remove('hidden');
            document.getElementById('uploadSuccess').classList.add('flex');
            document.getElementById('fileName').textContent = filename;
        }

        function clearFile() {
            document.getElementById('dropZone').classList.remove('has-file');
            document.getElementById('dropZoneContent').classList.remove('hidden');
            document.getElementById('uploadSuccess').classList.add('hidden');
            document.getElementById('uploadSuccess').classList.remove('flex');
            document.getElementById('fileInput').value = '';
            uploadedFileName = null;
        }

        function clearScript() {
            document.getElementById('scriptInput').value = '';
        }

        function clearMidPrompt() {
            document.getElementById('midPrompt').value = '';
        }

        // Handle Reference Images
        function handleRefImage(e, type) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                referenceImages[type] = event.target.result;
                
                // Update UI
                const zone = type === 'char' ? 'charRefZone' : 'sceneRefZone';
                const content = type === 'char' ? 'charRefContent' : 'sceneRefContent';
                const preview = type === 'char' ? 'charRefPreview' : 'sceneRefPreview';
                
                document.getElementById(zone).classList.add('has-image');
                document.getElementById(content).classList.add('hidden');
                const img = document.getElementById(preview);
                img.src = event.target.result;
                img.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // AI Analysis
        async function analyzeScript() {
            const script = document.getElementById('scriptInput').value.trim();
            
            if (!script) {
                alert('请输入剧本内容');
                return;
            }

            showLoading('正在分析剧本结构及风格...', 'AI正在识别场景和镜头...');

            try {
                await simulateAIAnalysis(script);
                autoFillStyle(script);
                renderScenesList();
                // 自动将剧本内容填入中缀框
                document.getElementById('midPrompt').value = script.substring(0, 500) + (script.length > 500 ? '...' : '');
                hideLoading();
                saveToLocalStorage();
            } catch (error) {
                hideLoading();
                alert('分析失败: ' + error.message);
            }
        }

        function autoFillStyle(script) {
            const lowerScript = script.toLowerCase();
            let atmosphere = '电影感 cinematic';
            let color = 'cinematic color grading';
            let lighting = 'dramatic lighting';
            
            if (lowerScript.includes('雨') || lowerScript.includes('夜') || lowerScript.includes('暗') || lowerScript.includes('悬疑')) {
                atmosphere = '悬疑紧张 noir风格';
                color = '高对比度黑白，冷色调 blue-teal tones';
                lighting = '低调照明 low-key lighting，硬光剪影，霓虹反光';
            } else if (lowerScript.includes('科幻') || lowerScript.includes('未来') || lowerScript.includes('赛博')) {
                atmosphere = '赛博朋克 cyberpunk，未来主义';
                color = '青橙对比 teal-orange contrast，霓虹色调 neon colors';
                lighting = '体积光 volumetric lighting，LED光源，全息投影';
            } else if (lowerScript.includes('温馨') || lowerScript.includes('家庭') || lowerScript.includes('爱情')) {
                atmosphere = '温馨治愈 warm，柔和浪漫 romantic';
                color = '暖色调 warm tones，金色时光 golden hour';
                lighting = '柔光散射 soft lighting，自然光 natural light';
            } else if (lowerScript.includes('战') || lowerScript.includes('动作') || lowerScript.includes('追逐')) {
                atmosphere = '紧张刺激 intense，高能动作 action-packed';
                color = 'desaturated muted colors，冷灰调 cool grays';
                lighting = '手持摄影感 handheld feel，快速剪辑光效';
            }
            
            document.getElementById('atmosphere').value = atmosphere;
            document.getElementById('colorPalette').value = color;
            document.getElementById('lighting').value = lighting;
        }

        function regenerateStyle() {
            const script = document.getElementById('scriptInput').value;
            if (script.trim()) {
                autoFillStyle(script);
                const btn = document.querySelector('button[onclick="regenerateStyle()"]');
                const original = btn.innerHTML;
                btn.innerHTML = '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 已刷新';
                setTimeout(() => btn.innerHTML = original, 1000);
            }
        }

        async function simulateAIAnalysis(script) {
            await new Promise(resolve => setTimeout(resolve, 800));
            
            const lines = script.split('\n').filter(l => l.trim());
            scenes = [];
            let currentScene = null;
            let shotCounter = 1;
            
            const scenePatterns = [
                /^第[一二三四五六七八九十\d]+场[：:]/,
                /^场景?\s*\d+[：:]/,
                /^SCENE\s*\d+[：:]/i,
                /^(EXT|INT)[\.\s]/i,
                /^场\s*\d+/,
                /^景\s*\d+/
            ];
            
            lines.forEach((line) => {
                const trimmedLine = line.trim();
                const isSceneHeader = scenePatterns.some(pattern => pattern.test(trimmedLine)) ||
                                     (trimmedLine.includes('场') && trimmedLine.length < 25 && !trimmedLine.includes('。'));
                
                if (isSceneHeader) {
                    if (currentScene && currentScene.shots.length > 0) {
                        scenes.push(currentScene);
                    }
                    currentScene = {
                        id: `SC${scenes.length + 1}`,
                        title: trimmedLine,
                        shots: []
                    };
                } else if (currentScene && trimmedLine.length > 5) {
                    const sentences = trimmedLine.match(/[^。！？.!?]+[。！？.!?]+/g) || [trimmedLine];
                    sentences.forEach(sentence => {
                        if (sentence.trim().length > 5) {
                            currentScene.shots.push({
                                id: `${currentScene.id}_SHOT${shotCounter++}`,
                                description: sentence.trim(),
                                type: '中景',
                                cameraMove: '固定',
                                x: 100 + ((shotCounter-1) % 5) * 320,
                                y: 100 + Math.floor((shotCounter-1) / 5) * 240,
                                width: 300,
                                height: 200
                            });
                        }
                    });
                }
            });
            
            if (currentScene && currentScene.shots.length > 0) {
                scenes.push(currentScene);
            }
            
            if (scenes.length === 0 && script.length > 0) {
                const defaultScene = {
                    id: 'SC1',
                    title: '未命名场景',
                    shots: []
                };
                const sentences = script.match(/[^。！？.!?]+[。！？.!?]+/g) || [script];
                sentences.forEach((sentence, idx) => {
                    if (sentence.trim().length > 5) {
                        defaultScene.shots.push({
                            id: `SC1_SHOT${shotCounter++}`,
                            description: sentence.trim(),
                            type: '中景',
                            cameraMove: '固定',
                            x: 100 + (idx % 5) * 320,
                            y: 100 + Math.floor(idx / 5) * 240,
                            width: 300,
                            height: 200
                        });
                    }
                });
                if (defaultScene.shots.length > 0) {
                    scenes.push(defaultScene);
                }
            }
        }

        // Render Scenes for clicking to append to mid prompt
        function renderScenesList() {
            const container = document.getElementById('scenesList');
            document.getElementById('sceneCount').textContent = `${scenes.length} 场`;
            
            if (scenes.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-600 text-xs py-8 flex flex-col items-center gap-2">
                        <span>请先上传剧本并点击"AI 拆解"</span>
                        <span class="text-[10px] opacity-50">拆解后点击镜头追加到中缀</span>
                    </div>`;
                return;
            }
            
            container.innerHTML = scenes.map((scene) => `
                <div class="scene-item rounded bg-white/5" data-scene-id="${scene.id}">
                    <div class="p-2 flex items-center gap-2 cursor-pointer hover:bg-white/10" onclick="toggleScene('${scene.id}')">
                        <span class="text-[10px] font-bold text-purple-400 mono bg-purple-500/10 px-1.5 py-0.5 rounded">${scene.id}</span>
                        <span class="text-xs text-gray-300 truncate flex-1 font-medium">${scene.title}</span>
                        <span class="text-[10px] text-gray-500 bg-black/30 px-1.5 py-0.5 rounded-full">${scene.shots.length} 镜</span>
                        <svg class="w-3 h-3 text-gray-500 transition-transform" id="arrow-${scene.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                    <div class="shot-list expanded bg-black/20" id="shots-${scene.id}">
                        ${scene.shots.map(shot => `
                            <div class="shot-item text-gray-400 flex items-center gap-2 hover:bg-purple-500/10" 
                                 onclick="appendToMidPrompt('${shot.description.replace(/'/g, "\\'")}')" 
                                 title="点击追加到中缀对话框">
                                <span class="mono text-gray-500 text-[9px] w-10 flex-shrink-0">${shot.id.split('_')[1]}</span>
                                <span class="truncate flex-1 leading-snug">${shot.description}</span>
                                <span class="text-[9px] text-purple-400 opacity-0 hover:opacity-100 transition-opacity">+追加</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function appendToMidPrompt(text) {
            const midArea = document.getElementById('midPrompt');
            const current = midArea.value;
            if (current && !current.endsWith('\n') && !current.endsWith(' ')) {
                midArea.value = current + '\n' + text;
            } else {
                midArea.value = current + text;
            }
            // Visual feedback
            midArea.style.borderColor = '#a855f7';
            setTimeout(() => {
                midArea.style.borderColor = 'rgba(168, 85, 247, 0.3)';
            }, 300);
        }

        function toggleScene(sceneId) {
            const shotList = document.getElementById(`shots-${sceneId}`);
            const arrow = document.getElementById(`arrow-${sceneId}`);
            
            if (shotList.classList.contains('expanded')) {
                shotList.classList.remove('expanded');
                arrow.style.transform = 'rotate(0deg)';
            } else {
                shotList.classList.add('expanded');
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        // Generate with all components
        async function generateWithAllPrompts() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert('请先配置 API Key');
                return;
            }

            const midPrompt = document.getElementById('midPrompt').value.trim();
            if (!midPrompt) {
                alert('请先填写中缀提示词（剧本内容）');
                return;
            }

            const prefix = getPrefixPrompt();
            const suffix = document.getElementById('suffixPrompt').value;
            const fullPrompt = `${prefix} ${midPrompt} ${suffix}`;
            
            showLoading('正在生成图片...', '组合前缀+中缀+后缀+参考图...');
            document.getElementById('loadingPrompt').textContent = `完整提示词: ${fullPrompt}`;

            try {
                // Build request body
                const body = {
                    model: document.getElementById('imageModel').value,
                    prompt: fullPrompt,
                    n: 1,
                    size: getImageSize(),
                    quality: "standard"
                };

                // Add reference images if present (as image_url for models that support it)
                const refs = [];
                if (referenceImages.character) {
                    refs.push({ type: "character", image: referenceImages.character });
                }
                if (referenceImages.scene) {
                    refs.push({ type: "scene", image: referenceImages.scene });
                }
                
                if (refs.length > 0) {
                    // For APIs that support image_reference or similar
                    body.reference_images = refs;
                    // Alternative: for img2img, we'd send as image parameter
                }

                const response = await fetch('https://api.toapis.com/v1/images/generations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(body)
                });

                if (!response.ok) throw new Error('API 请求失败');
                
                const data = await response.json();
                const imageUrl = data.data[0].url;
                
                // Create shot on canvas with this image
                createShotOnCanvas(imageUrl, fullPrompt);
                
                hideLoading();
                saveToLocalStorage();
            } catch (error) {
                console.error(error);
                hideLoading();
                alert('生成失败，使用模拟图片');
                // Fallback
                const mockUrl = `https://picsum.photos/seed/${Date.now()}/800/600`;
                createShotOnCanvas(mockUrl, fullPrompt);
            }
        }

        function createShotOnCanvas(imageUrl, promptText) {
            const container = document.getElementById('shotsContainer');
            const id = `GEN_${Date.now()}`;
            const x = 100 + (container.children.length % 5) * 320;
            const y = 100 + Math.floor(container.children.length / 5) * 240;
            
            const el = document.createElement('div');
            el.className = 'shot-card has-image';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.width = '300px';
            el.style.height = '200px';
            el.dataset.id = id;
            
            el.innerHTML = `
                <div class="h-full flex flex-col">
                    <div class="h-6 bg-white/5 border-b border-white/5 flex items-center justify-between px-2">
                        <span class="text-[10px] text-gray-500 mono">AI生成</span>
                        <div class="flex gap-1">
                            <button onclick="event.stopPropagation(); viewPrompt('${promptText.replace(/'/g, "\\'")}')" class="text-gray-600 hover:text-purple-400 transition-colors p-1" title="查看提示词">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </button>
                            <button onclick="event.stopPropagation(); this.closest('.shot-card').remove()" class="text-gray-600 hover:text-red-400 transition-colors p-1" title="删除">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex-1 relative bg-black/40">
                        <img src="${imageUrl}" class="w-full h-full object-cover" alt="">
                        <div class="resize-handle" onmousedown="event.stopPropagation(); startResize(event, '${id}')"></div>
                    </div>
                </div>
            `;
            
            el.addEventListener('mousedown', (e) => {
                if (e.target.closest('button') || e.target.classList.contains('resize-handle')) return;
                startDrag(e, id);
            });
            
            container.appendChild(el);
            updateCanvasStats();
        }

        function viewPrompt(prompt) {
            alert('完整提示词：\n\n' + prompt);
        }

        function getPrefixPrompt() {
            const atmosphere = document.getElementById('atmosphere').value || '电影感 cinematic';
            const color = document.getElementById('colorPalette').value || 'cinematic color grading';
            const lighting = document.getElementById('lighting').value || 'dramatic lighting';
            return `${atmosphere}, ${color}, ${lighting},`;
        }

        function getImageSize() {
            const sizes = {
                '16:9': '1024x576',
                '4:3': '1024x768',
                '2.39:1': '1280x536',
                '1:1': '1024x1024'
            };
            return sizes[currentAspectRatio] || '1024x1024';
        }

        function setGridSize(size) {
            currentGrid = size;
            document.querySelectorAll('.grid-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.grid === size);
            });
            updateSuffixPrompt();
        }

        function setAspectRatio(ratio) {
            currentAspectRatio = ratio;
            document.querySelectorAll('.aspect-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.aspect === ratio);
            });
            updateSuffixPrompt();
        }

        function updateSuffixPrompt() {
            const template = defaultSuffixPrompts[currentGrid];
            const aspectDesc = aspectRatioDesc[currentAspectRatio];
            const prompt = template.replace('{aspectRatio}', aspectDesc);
            document.getElementById('suffixPrompt').value = prompt;
        }

        function resetSuffixPrompt() {
            updateSuffixPrompt();
        }

        function toggleGrid() {
            document.getElementById('gridOverlay').classList.toggle('active');
        }

        function updateZoom(value) {
            zoom = value;
            document.getElementById('zoomValue').textContent = value + '%';
            document.getElementById('canvas').style.transform = `scale(${value / 100})`;
        }

        function clearCanvas() {
            if (confirm('确定要清空画布吗？')) {
                document.getElementById('shotsContainer').innerHTML = '';
                updateCanvasStats();
            }
        }

        function startDrag(e, id) {
            e.preventDefault();
            draggedElement = e.currentTarget;
            const rect = draggedElement.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            draggedElement.classList.add('dragging');
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function onDrag(e) {
            if (!draggedElement) return;
            const canvas = document.getElementById('canvas');
            const canvasRect = canvas.getBoundingClientRect();
            const zoomFactor = zoom / 100;
            
            let x = (e.clientX - canvasRect.left - dragOffset.x) / zoomFactor;
            let y = (e.clientY - canvasRect.top - dragOffset.y) / zoomFactor;
            
            x = Math.max(0, Math.min(x, 3000 - draggedElement.offsetWidth));
            y = Math.max(0, Math.min(y, 2000 - draggedElement.offsetHeight));
            
            draggedElement.style.left = x + 'px';
            draggedElement.style.top = y + 'px';
        }

        function stopDrag() {
            if (draggedElement) {
                draggedElement.classList.remove('dragging');
                draggedElement = null;
            }
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        function startResize(e, id) {
            e.preventDefault();
            e.stopPropagation();
            const el = document.querySelector(`[data-id="${id}"]`);
            if (!el) return;
            
            const startX = e.clientX;
            const startY = e.clientY;
            const startWidth = el.offsetWidth;
            const startHeight = el.offsetHeight;
            
            function onResize(ev) {
                const dx = (ev.clientX - startX) / (zoom / 100);
                const dy = (ev.clientY - startY) / (zoom / 100);
                el.style.width = Math.max(150, startWidth + dx) + 'px';
                el.style.height = Math.max(100, startHeight + dy) + 'px';
            }
            
            function stopResize() {
                document.removeEventListener('mousemove', onResize);
                document.removeEventListener('mouseup', stopResize);
            }
            
            document.addEventListener('mousemove', onResize);
            document.addEventListener('mouseup', stopResize);
        }

        function deselectAll(event) {
            if (event.target.id === 'canvas' || event.target.id === 'canvasContainer') {
                document.querySelectorAll('.shot-card').forEach(el => el.classList.remove('selected'));
                selectedShot = null;
            }
        }

        function updateCanvasStats() {
            const count = document.querySelectorAll('.shot-card').length;
            document.getElementById('canvasStats').textContent = `已生成 ${count} 张`;
        }

        function showLoading(text, detail) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingDetail').textContent = detail;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('loadingOverlay').classList.add('flex');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('loadingOverlay').classList.remove('flex');
        }

        function toggleApiSettings() {
            document.getElementById('apiSettings').classList.toggle('hidden');
        }

        function setupCanvasInteractions() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Delete' && selectedShot) {
                    const el = document.querySelector(`[data-id="${selectedShot}"]`);
                    if (el) el.remove();
                    updateCanvasStats();
                }
            });
        }

        function saveToLocalStorage() {
            const data = {
                scenes,
                currentGrid,
                currentAspectRatio,
                style: {
                    atmosphere: document.getElementById('atmosphere').value,
                    color: document.getElementById('colorPalette').value,
                    lighting: document.getElementById('lighting').value
                },
                midPrompt: document.getElementById('midPrompt').value,
                suffixPrompt: document.getElementById('suffixPrompt').value
            };
            localStorage.setItem('storyboard_ai_v4', JSON.stringify(data));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('storyboard_ai_v4');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    scenes = data.scenes || [];
                    if (data.style) {
                        document.getElementById('atmosphere').value = data.style.atmosphere || '';
                        document.getElementById('colorPalette').value = data.style.color || '';
                        document.getElementById('lighting').value = data.style.lighting || '';
                    }
                    if (data.midPrompt) document.getElementById('midPrompt').value = data.midPrompt;
                    if (data.suffixPrompt) document.getElementById('suffixPrompt').value = data.suffixPrompt;
                    
                    currentGrid = data.currentGrid || '5x5';
                    currentAspectRatio = data.currentAspectRatio || '16:9';
                    setGridSize(currentGrid);
                    setAspectRatio(currentAspectRatio);
                    renderScenesList();
                } catch (e) {
                    console.error(e);
                }
            }
        }

        function exportProject() {
            const shots = Array.from(document.querySelectorAll('.shot-card img')).map(img => img.src);
            const data = { scenes, shots, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `storyboard_${Date.now()}.json`;
            a.click();
        }
    </script>
</body>
</html>
